---
layout: list
---


<h1 class="page-heading">Project</h1>

<ul class="index-list">
  {% for item in site.data.projects %}
  <li class="li-item">
    <h3 class="li-item-title">
      <a href="{{ item.url }}">{{ item.name }} </a>
    </h3>
    <p class="li-item-description">
      {{item.desc}}
    </p>
  </li>
  {% endfor %}
</ul>
