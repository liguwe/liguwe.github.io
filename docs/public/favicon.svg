    <pattern id="favicon-grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path
        d="M 64 0 L 0 0 0 64"
        fill="none"
        stroke="#1e69f6"
        stroke-width="2"
        opacity="0.1"
      />
      <circle cx="64" cy="64" r="2" fill="#1e69f6" opacity="0.3" />
    </pattern>
    <pattern
      id="favicon-hatch"
      width="12"
      height="12"
      patternUnits="userSpaceOnUse"
      patternTransform="rotate(45)"
    >
      <line
        x1="0"
        y1="0"
        x2="0"
        y2="12"
        stroke="#ffffff"
        stroke-width="2"
        opacity="0.15"
      />
    </pattern>
    <linearGradient id="favicon-eight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="40%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
